name: Build and Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/keystore.jks
          echo "KEYSTORE_FILE=${{ github.workspace }}/keystore.jks" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: music-practice-player-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Music Practice Player v${{ steps.version.outputs.version }}
          body: |
            ## Music Practice Player v${{ steps.version.outputs.version }}

            ### Features
            - Open MP3 files directly from the app or from the Files app
            - Start/stop playback
            - Seek forward/backward 10 seconds
            - Set loop start/end with visual highlight on the seek bar
            - Toggle loop playback
            - Adjust playback speed in 10% steps (10%–200%)
            - Return to start (or loop start when loop is active)

            ### Keyboard Shortcuts
            | Key | Action |
            |-----|--------|
            | Space / Media Play/Pause | Play / Pause |
            | Page Up | Seek backward 10s |
            | Page Down | Seek forward 10s |
            | S | Set loop start |
            | E | Set loop end (activates loop) |
            | L | Toggle loop |
            | + or = | Speed up |
            | - | Slow down |
            | R | Return to start |
          files: app/build/outputs/apk/release/*.apk
          make_latest: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
